# Teable Sync Docker deployment
# Default stack runs only the application. Configure SQL databases and Teable connections in the UI.

services:
  teable-sync:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "3101:3101"
    environment:
      - NODE_ENV=production
      - PORT=3101
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - AUTO_RESUME_TASKS=${AUTO_RESUME_TASKS:-true}
      - AUTO_RESUME_RUN_IMMEDIATELY=${AUTO_RESUME_RUN_IMMEDIATELY:-false}
      - SERVER_PUBLIC_URL=${SERVER_PUBLIC_URL:-http://localhost:3101}
      - TEABLE_OAUTH_HOST=${TEABLE_OAUTH_HOST:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3101}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:-${JWT_SECRET:-your-jwt-secret-change-in-production}}
      - TEABLE_RATE_LIMIT_MS=${TEABLE_RATE_LIMIT_MS:-120}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - INITIAL_FULL_SYNC_MAX_ROWS=${INITIAL_FULL_SYNC_MAX_ROWS:-100000}
      - INITIAL_FULL_SYNC_WARN_ROWS=${INITIAL_FULL_SYNC_WARN_ROWS:-50000}
      - ALERT_NOTIFICATION_SCAN_INTERVAL_MS=${ALERT_NOTIFICATION_SCAN_INTERVAL_MS:-60000}
      - RECONCILE_DATE_TIME_ZONE=${RECONCILE_DATE_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - teable-sync-data:/app/server/data
    restart: unless-stopped

volumes:
  teable-sync-data:
