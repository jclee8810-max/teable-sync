# Teable Sync image deployment.
# This file is for users who only want to pull and run the published image.

services:
  teable-sync:
    image: ghcr.io/jclee8810-max/teable-sync:latest
    ports:
      - "${PORT:-3101}:3101"
    environment:
      - NODE_ENV=production
      - PORT=3101
      - AUTO_RESUME_TASKS=${AUTO_RESUME_TASKS:-true}
      - AUTO_RESUME_RUN_IMMEDIATELY=${AUTO_RESUME_RUN_IMMEDIATELY:-false}
      - SERVER_PUBLIC_URL=${SERVER_PUBLIC_URL:-http://localhost:3101}
      - TEABLE_OAUTH_HOST=${TEABLE_OAUTH_HOST:-http://localhost:3000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3101}
      - TEABLE_OAUTH_CLIENT_ID=${TEABLE_OAUTH_CLIENT_ID:-}
      - TEABLE_OAUTH_CLIENT_SECRET=${TEABLE_OAUTH_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CONFIG_ENCRYPTION_KEY=${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY is required}
      - TEABLE_RATE_LIMIT_MS=${TEABLE_RATE_LIMIT_MS:-120}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TEABLE_SYNC_RUNTIME_STORE=${TEABLE_SYNC_RUNTIME_STORE:-sqlite}
      - RUNTIME_STORE_DATA_DIR=${RUNTIME_STORE_DATA_DIR:-/app/server/data}
      - RUNTIME_SQLITE_FILE=${RUNTIME_SQLITE_FILE:-/app/server/data/runtime.sqlite}
      - INITIAL_FULL_SYNC_MAX_ROWS=${INITIAL_FULL_SYNC_MAX_ROWS:-100000}
      - INITIAL_FULL_SYNC_WARN_ROWS=${INITIAL_FULL_SYNC_WARN_ROWS:-50000}
      - INITIALIZATION_CONCURRENCY=${INITIALIZATION_CONCURRENCY:-1}
      - INITIALIZATION_QUEUE_AVG_RUN_MINUTES=${INITIALIZATION_QUEUE_AVG_RUN_MINUTES:-30}
      - ALERT_NOTIFICATION_SCAN_INTERVAL_MS=${ALERT_NOTIFICATION_SCAN_INTERVAL_MS:-60000}
      - RECONCILE_DATE_TIME_ZONE=${RECONCILE_DATE_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - teable-sync-data:/app/server/data
    restart: unless-stopped

volumes:
  teable-sync-data:
